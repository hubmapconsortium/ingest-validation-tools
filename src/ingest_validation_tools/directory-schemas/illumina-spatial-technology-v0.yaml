files:
  -
    pattern: extras\/.*
    required: True
    description: Folder for general lab-specific files related to the dataset.
  -
    pattern: extras\/microscope_hardware\.json$
    required: True
    description: A file generated by the micro-meta app that contains a description of the hardware components of the microscope. Email HuBMAP Consortium Help Desk <help@hubmapconsortium.org> if help is required in generating this document.
    is_qa_qc: True
  -
    pattern: extras\/microscope_settings\.json$
    required: False
    description: A file generated by the micro-meta app that contains a description of the settings that were used to acquire the image data. Email HuBMAP Consortium Help Desk <help@hubmapconsortium.org> if help is required in generating this document.
    is_qa_qc: True
  -
    pattern: raw\/.*
    required: True
    description: All raw data files for the experiment.
  -
    pattern: lab_processed\/.*
    required: True
    description: Experiment files that were processed by the lab generating the data.
  -
    pattern: lab_processed\/alignment\.json$
    required: True
    description: JSON file for the manual tissue alignment created using Loupe browser and used as input to Space Ranger.
  -
    pattern: lab_processed\/images\/.*
    required: True
    description: Processed image files
  -
    pattern: lab_processed\/images\/[^\/]+\.ome\.tiff$
    required: True
    description: OME-TIFF files (multichannel, multi-layered) produced by the microscopy experiment. If compressed, must use loss-less compression algorithm. For Visium this stitched file should only include the single capture area relevant to the current dataset. For GeoMx there will be one OME TIFF file per slide, with each slide including multiple AOIs. See the following link for the set of fields that are required in the OME TIFF file XML header. <https://docs.google.com/spreadsheets/d/1YnmdTAA0Z9MKN3OjR3Sca8pz-LNQll91wdQoRPSP6Q4/edit#gid=0>
    is_qa_qc: False
    example: lab_processed/images/HBM892.MDXS.293.ome.tiff
  -
    pattern: lab_processed\/images\/[^\/]*ome-tiff\.channels\.csv$
    required: True
    description: This file provides essential documentation pertaining to each channel of the accommpanying OME TIFF. The file should contain one row per OME TIFF channel. The required fields are detailed <https://docs.google.com/spreadsheets/d/1xEJSb0xn5C5fB3k62pj1CyHNybpt4-YtvUs5SUMS44o/edit#gid=0>
    is_qa_qc: False
  -
    pattern: lab_processed\/dragen\/.*
    required: True
    description: Output from the Illumina Spatial Transcriptome pipeline.
  -
    pattern: lab_processed\/dragen\/pipeline-manifest\.json$
    required: True
    description: The pipeline execution parameter file
    is_qa_qc: False
  -
    pattern: lab_processed\/dragen\/.*contour\.*\.csv$
    required: True
    description: The coordinate matrices containing the machine-learning-derived cell or nuclei boundaries.
    is_qa_qc: False
  -
    pattern: lab_processed\/dragen\/.*_cell_binned_normalized\.h5ad$
    required: True
    description: Normalized Dragen AnnData object containing cell-binned spatial gene expression and cell metadata. 
    is_qa_qc: False
  -
    pattern: lab_processed\/dragen\/.*_cell_binned_pca\.h5ad$
    required: True
    description: AnnData object containing cell-binned spatial gene expression, cell metadata and PCA embeddings. 
    is_qa_qc: False
  -
    pattern: lab_processed\/dragen\/.*_cell_binned_umap\.h5ad$
    required: True
    description: AnnData object containing cell-binned spatial gene expression, cell metadata and PCA UMAP. 
    is_qa_qc: False
  -
    pattern: lab_processed\/dragen\/.*_cell_binned\.h5ad$
    required: True
    description: AnnData object containing cell-binned spatial gene expression and cell metadata. 
    is_qa_qc: False
  -
    pattern: lab_processed\/dragen\/.*_grid_binned_normalized\.h5ad$
    required: True
    description: Normalized AnnData object containing grid-binned spatial gene expression and cell metadata. 
    is_qa_qc: False
  -
    pattern: lab_processed\/dragen\/.*_grid_binned_pca\.h5ad$
    required: True
    description: AnnData object containing grid-binned spatial gene expression, cell metadata and PCA embeddings. 
    is_qa_qc: False
  -
    pattern: lab_processed\/dragen\/.*_grid_binned_umap\.h5ad$
    required: True
    description: AnnData object containing grid-binned spatial gene expression, cell metadata and PCA UMAP. 
    is_qa_qc: False
  -
    pattern: lab_processed\/dragen\/.*_grid_binned\.h5ad$
    required: True
    description: AnnData object containing grid-binned spatial gene expression and cell metadata. 
    is_qa_qc: False